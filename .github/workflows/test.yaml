name: Test Features

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  shell:
    name: Shell checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run local checks
        run: ./test/tools/run-local-tests.sh
      - name: Run wrapper mount checks
        run: ./test/tools/test-wrapper-mounts.sh

  autogenerated:
    name: Test tools on ${{ matrix.base-image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        base-image:
          - debian:bookworm
          - ubuntu:24.04
          - mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@v4
      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli
      - name: Run autogenerated Feature tests
        run: devcontainer features test --skip-scenarios -f tools -i ${{ matrix.base-image }} .

  scenarios:
    name: Test tools scenarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dev Container CLI
        run: npm install -g @devcontainers/cli
      - name: Run scenario Feature tests
        run: devcontainer features test -f tools --skip-autogenerated --skip-duplicated .
